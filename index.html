<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crorepati Pookie Party</title><link rel="stylesheet" href="style.css">
</head>
<body>
<div class="float f1">💖</div><div class="float f2">✨</div><div class="float f3">🎀</div><div class="float f4">💰</div>
<main class="app">
<section id="homeScreen" class="screen active"><div class="hero">
<div class="logo">💖💰</div><h1>Crorepati Pookie Party</h1><p class="sub">2 or 3 players • Room code • Cute animated quiz</p>
<div class="homeGrid">
<div class="card"><h2>Create Room</h2><input id="createName" placeholder="Your name"><select id="createAvatar"><option>🐰</option><option>🐻</option><option>🦋</option><option>🌙</option><option>😎</option></select><label>Players</label><select id="playerMode"><option value="2">2 Player Mode</option><option value="3" selected>3 Player Mode</option></select><label>Category</label><select id="category"><option value="mixed">🎲 Mixed</option><option value="riddles">🧩 Riddles</option><option value="funny">😂 Funny</option><option value="currentAffairs">📰 Current Affairs</option><option value="upsc">🏛️ UPSC</option><option value="love">💖 Love</option><option value="football">⚽ Football</option><option value="movies">🎬 Movies</option><option value="food">🍔 Food</option><option value="gaming">🎮 Gaming</option><option value="brainTeasers">🧠 Brain Teasers</option><option value="college">🏫 College</option></select><button id="createBtn" class="btn primary">Create Cute Room 🎀</button></div>
<div class="card"><h2>Join Room</h2><input id="joinName" placeholder="Your name"><input id="joinCode" placeholder="Room code"><select id="joinAvatar"><option>🐰</option><option>🐻</option><option>🦋</option><option>🌙</option><option>😎</option></select><button id="joinBtn" class="btn secondary">Join Room 💫</button></div>
</div><p id="homeMsg" class="msg"></p></div></section>
<section id="lobbyScreen" class="screen"><div class="top"><div><small>Room Code</small><h2 id="roomCode">------</h2></div><button id="copyBtn" class="btn mini">Copy</button></div><div class="card"><h2>Waiting Room 🎀</h2><p id="modeText"></p><div id="lobbyPlayers" class="players"></div><button id="startBtn" class="btn primary">Start Game 🚀</button><p id="lobbyMsg" class="msg"></p></div></section>
<section id="gameScreen" class="screen"><div class="layout"><div>
<div class="host card"><div class="hostFace">🎙️</div><div><h2>Pookie Host</h2><p id="hostText"></p></div></div>
<div class="card questionCard"><div class="badges"><span id="turnBadge" class="pill"></span><span id="qBadge" class="pill"></span><span id="catBadge" class="pill"></span></div><div id="timer" class="timer">30</div><h2 id="questionText"></h2><div id="options" class="options"></div></div>
<div class="card"><h3>Lifelines 💝</h3><div class="lifelines"><button id="fifty" class="btn life">50:50 ✂️</button><button id="audience" class="btn life">Audience 👥</button><button id="friend" class="btn life">Call Pookie ☎️</button><button id="ai" class="btn life">AI Pookie 🤖</button><button id="swap" class="btn life">Swap 🔄</button><button id="skip" class="btn life">Skip ⏭️</button></div></div>
<div id="resultCard" class="card hidden"><h3 id="resultTitle"></h3><div id="resultText"></div></div>
</div><aside><div class="card"><h3>Players 🏆</h3><div id="scoreBoard"></div></div><div class="card"><h3>Money Ladder 💰</h3><div id="ladder" class="ladder"></div></div><div class="card"><h3>Room Chat 💬</h3><div id="chatBox" class="chat"></div><div class="chatRow"><input id="chatInput" placeholder="Say something cute..."><button id="sendChat" class="btn mini">Send</button></div></div></aside></div></section>
<section id="finalScreen" class="screen"><div class="card final"><div class="trophy">🏆💖</div><h1>Game Over</h1><div id="winnerBox"></div><button onclick="location.reload()" class="btn primary">Play Again 🔁</button></div></section>
</main><script src="questions.js"></script><script type="module" src="firebase.js"></script><script type="module" src="script.js"></script>
</body></html>
